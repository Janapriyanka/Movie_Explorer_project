<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Filmlane Collections</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Main CSS -->
<link rel="stylesheet" href="./collection.css">

</head>


<body class="bg-black text-white">

<!-- CSS Boundary Container -->
<div class="collections-page">

    <!-- NAVBAR -->
<header class="header">
    <div class="container">

        <a href="#" class="logo">
            <img src="./images/logo.svg" alt="Filmlane">
        </a>

        <nav class="navbar" id="navbar">
            <ul class="navbar-list">
                <li><a href="./index.html" class="navbar-link">Home</a></li>
                <li><a href="./collections.html" class="navbar-link">Collections</a></li>
                <li><a href="./contact.html" class="navbar-link">Contact</a></li>
            </ul>

            

        </nav>

        <div class="header-actions">
            <div class="lang-wrapper">
                <select>
                    <option style="color:black; background-color: white;">EN</option>
                    <option style="color:black; background-color: white;">AU</option>
                    <option style="color:black; background-color: white;">AR</option>
                </select>
            </div>

            <button class="btn-primary">Sign in</button>
        </div>


        <button class="menu-toggle" id="menuToggle">☰</button>
        
</button>



    </div>
</header>

<!-- Page Title -->

<h1 class="text-3xl font-bold text-center mb-10 ">
Movie Collections
</h1>


<!-- Search + Filter Section -->

<div class="filter-section">

<input
type="text"
id="searchInput"
placeholder="Search movies..."
class="text-black"
/>


<select id="filterGenre" class="text-black">

<option value="all">All Genres</option>

<option value="Action">Action</option>

<option value="Drama">Drama</option>

<option value="Sci-Fi">Sci-Fi</option>

<option value="Thriller">Thriller</option>

</select>

</div>


<!-- Movie Grid -->

<div id="movieContainer"></div>


</div>




<!-- JavaScript -->

<script src="./collections.js"></script>

</body>

</html>
